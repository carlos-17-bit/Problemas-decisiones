<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Bonos Mensuales</title>
    <link rel="stylesheet" href="../styles/estilo3.8.css">
</head>
<body>
    <div class="bonomay">
        <h2>Cálculo de Bono Mayor</h2>
        
        <div class="sueldo">
            <label for="sueldo">Sueldo Mensual:</label>
            <input type="number" id="sueldo">
        </div>

        <div class="antiguedad">
            <label for="antiguedad">Años de Antigüedad:</label>
            <input type="number" id="antiguedad">
        </div>

        <button onclick="calcularBono()">Calcular Mejor Bono</button>

        <div id="resultado" class="results-box"></div>
        
        <img src="../imagenes/bono.jpg" alt="bono">
    </div>
</body>
<script src="../scripts/3.8.js"></script>
</html>
