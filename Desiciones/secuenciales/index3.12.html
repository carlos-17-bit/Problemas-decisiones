<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Sueldo</title>
    <link rel="stylesheet" href="../styles/estilo3.12.css">
</head>
<body>
    <div class="sueldo">
        <h2>Sueldo Semanal</h2>
        <label for="horas">Horas trabajadas:</label>
        <input type="number" id="horas" max="50">
        
        <label for="pago">Pago por hora:</label>
        <input type="number" id="pago">

        <button onclick="calcular()">Calcular Sueldo</button>
        
        <div id="resultado" class="resultado"></div>
        
        <img src="../imagenes/sueldosem.png" alt="sueldo">
    </div>
    
</body>
<script src="../scripts/3.12.js"></script>
</html>
